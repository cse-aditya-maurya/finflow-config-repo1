server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      routes:

        # 🔐 AUTH SERVICE
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        # 📄 APPLICATION SERVICE
        - id: application-service
          uri: lb://application-service
          predicates:
            - Path=/applications/**
          filters:
            - StripPrefix=1

        # 📁 DOCUMENT SERVICE
        - id: document-service
          uri: lb://document-service
          predicates:
            - Path=/documents/**
          filters:
            - StripPrefix=1

        # 🧑‍💼 ADMIN SERVICE
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=1

      # 🌍 GLOBAL CORS
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

    discovery:
      locator:
        enabled: false
        lower-case-service-id: true

# 🔥 Eureka
eureka:
  instance:
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# 🔥 Swagger Aggregation (FIXED)
springdoc:

  api-docs:
    enabled: false   # 🚨 VERY IMPORTANT (disable gateway default docs)

  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config

    urls:
      - name: AUTH SERVICE
        url: /auth/v3/api-docs

      - name: APPLICATION SERVICE
        url: /applications/v3/api-docs

      - name: DOCUMENT SERVICE
        url: /documents/v3/api-docs

      - name: ADMIN SERVICE
        url: /admin/v3/api-docs

# 🔥 Logging (optional but useful)
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG

# 🔥 Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"

# 🔐 JWT (for gateway validation)
jwt:
  secret: finflow_super_secure_jwt_secret_key_2026_project_backend
  expiration: 86400000
