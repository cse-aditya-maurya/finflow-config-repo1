spring:
  cloud:
    gateway:
      routes:
        # Auth service API routes
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
        
        # Auth service docs route (if you add SpringDoc to auth service)
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth/v3/api-docs/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /$\{segment}
        
        # Your other services...
        - id: application-service
          uri: lb://application-service
          predicates:
            - Path=/applications/**
          filters:
            - StripPrefix=0
            
        - id: document-service
          uri: lb://document-service
          predicates:
            - Path=/documents/**
          filters:
            - StripPrefix=0
            
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Application Service
        url: /applications/v3/api-docs
      - name: Document Service
        url: /documents/v3/api-docs
      - name: Admin Service
        url: /admin/v3/api-docs


